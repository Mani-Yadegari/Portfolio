<!DOCTYPE html>
<html lang="fa">
  <head>
    <meta charset="UTF-8" />
    <title>Lottie Test</title>
    <style>
      body {
        background: #0062f5; /* تست بک‌گراند */
      }
      #lottie {
        width: 300px;
        height: 300px;
        margin: 50px auto;
      }
    </style>
  </head>
  <body>
    <div id="lottie"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script>
      lottie.loadAnimation({
        container: document.getElementById("lottie"),
        renderer: "svg",
        loop: true,
        autoplay: true,
        path: "./animation/animation.json",
      });
    </script>
  </body>
</html>
